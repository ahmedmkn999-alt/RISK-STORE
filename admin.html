<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | RISK STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --card: #111;
            --card2: #161616;
            --accent: #e8c97a;
            --accent2: #c9a84c;
            --white: #f5f5f5;
            --muted: #666;
            --border: #1e1e1e;
            --green: #4ade80;
            --red: #f87171;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            background: #0a0a0a;
            border-bottom: 1px solid rgba(232,201,122,0.2);
            padding: 16px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 3px;
            color: var(--accent);
        }
        .logo span { color: var(--white); }
        .view-site {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--muted);
            font-size: 0.8rem;
            letter-spacing: 1px;
            border: 1px solid var(--border);
            padding: 8px 16px;
            transition: all 0.3s;
        }
        .view-site:hover { color: var(--accent); border-color: rgba(232,201,122,0.3); }

        /* LAYOUT */
        .admin-layout {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
            padding: 40px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .admin-layout { grid-template-columns: 1fr; }
        }

        /* SECTION TITLE */
        .panel-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 6px;
        }
        .panel-sub {
            color: var(--muted);
            font-size: 0.78rem;
            letter-spacing: 2px;
            margin-bottom: 24px;
        }

        /* FORM PANEL */
        .form-panel {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: var(--muted);
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .form-control {
            width: 100%;
            padding: 13px 16px;
            background: #0d0d0d;
            border: 1px solid var(--border);
            color: var(--white);
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.3s;
            outline: none;
        }
        .form-control:focus { border-color: rgba(232,201,122,0.4); }
        .form-control::placeholder { color: #333; }

        .price-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .img-preview {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            background: #0d0d0d;
            border: 1px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            overflow: hidden;
        }
        .img-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .img-preview-placeholder {
            color: #333;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-align: center;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: #000;
            border: none;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
            margin-top: 8px;
        }
        .btn-submit:hover { background: #fff; }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { background: #333; color: #666; cursor: not-allowed; }

        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--green);
            color: #000;
            padding: 12px 28px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            opacity: 0;
            transition: all 0.4s;
            z-index: 9999;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.error { background: var(--red); }

        /* PRODUCTS PANEL */
        .products-panel {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 30px;
        }

        .products-count {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(232,201,122,0.1);
            border: 1px solid rgba(232,201,122,0.2);
            color: var(--accent);
            font-size: 0.75rem;
            letter-spacing: 2px;
            padding: 4px 12px;
            margin-bottom: 20px;
        }

        .products-list { display: flex; flex-direction: column; gap: 12px; }

        .admin-product-item {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--card2);
            border: 1px solid var(--border);
            padding: 12px;
            transition: border-color 0.3s;
        }
        .admin-product-item:hover { border-color: rgba(232,201,122,0.15); }

        .admin-thumb {
            width: 60px;
            height: 70px;
            object-fit: cover;
            background: #0d0d0d;
            flex-shrink: 0;
        }

        .admin-product-info { flex: 1; min-width: 0; }
        .admin-product-name {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .admin-product-prices {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .price-new { color: var(--accent); font-family: 'Bebas Neue', sans-serif; font-size: 1rem; }
        .price-old-admin { color: var(--muted); font-size: 0.78rem; text-decoration: line-through; }

        .admin-actions { display: flex; gap: 8px; flex-shrink: 0; }

        .btn-edit {
            background: rgba(232,201,122,0.1);
            color: var(--accent);
            border: 1px solid rgba(232,201,122,0.2);
            padding: 7px 12px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn-edit:hover { background: rgba(232,201,122,0.2); }

        .btn-del {
            background: rgba(248,113,113,0.1);
            color: var(--red);
            border: 1px solid rgba(248,113,113,0.2);
            padding: 7px 12px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn-del:hover { background: rgba(248,113,113,0.2); }

        .empty-admin {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* STATS BAR */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            padding: 0 5% 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            text-align: center;
        }
        .stat-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            color: var(--accent);
            letter-spacing: 2px;
        }
        .stat-label {
            color: var(--muted);
            font-size: 0.7rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><span>RISK</span> STORE &nbsp;|&nbsp; لوحة التحكم</div>
        <a href="index.html" class="view-site">عرض الموقع ←</a>
    </header>

    <!-- STATS -->
    <div class="stats-bar" id="stats-bar">
        <div class="stat-card">
            <div class="stat-num" id="stat-total">0</div>
            <div class="stat-label">إجمالي المنتجات</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="stat-sale">0</div>
            <div class="stat-label">منتجات على خصم</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="stat-avg">0</div>
            <div class="stat-label">متوسط السعر (EGP)</div>
        </div>
    </div>

    <div class="admin-layout">
        <!-- ADD FORM -->
        <div class="form-panel">
            <h2 class="panel-title">إضافة قطعة</h2>
            <p class="panel-sub">ADD NEW PRODUCT</p>

            <div class="form-group">
                <label>اسم القطعة</label>
                <input type="text" id="prod-title" class="form-control" placeholder="مثال: تيشرت أوفر سايز أسود">
            </div>

            <div class="price-row">
                <div class="form-group">
                    <label>السعر الجديد (EGP)</label>
                    <input type="number" id="prod-price" class="form-control" placeholder="350">
                </div>
                <div class="form-group">
                    <label>السعر القديم (اختياري)</label>
                    <input type="number" id="prod-old-price" class="form-control" placeholder="500">
                </div>
            </div>

            <div class="form-group">
                <label>رابط صورة المنتج</label>
                <input type="url" id="prod-img" class="form-control" placeholder="https://i.postimg.cc/...">
                <div class="img-preview" id="img-preview">
                    <img id="preview-img" src="" alt="preview">
                    <div class="img-preview-placeholder" id="preview-placeholder">معاينة الصورة هنا</div>
                </div>
            </div>

            <button class="btn-submit" id="submit-btn" onclick="addProduct()">
                🔥 نشر القطعة فوراً
            </button>
        </div>

        <!-- PRODUCTS LIST -->
        <div class="products-panel">
            <h2 class="panel-title">المنتجات الحالية</h2>
            <p class="panel-sub">MANAGE PRODUCTS</p>
            <div class="products-count" id="products-count">0 منتج</div>
            <div class="products-list" id="admin-products-list">
                <div class="empty-admin">جاري التحميل...</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDwMOax-amBzEm3FDjXKN8yBbB3cXNbb14",
            authDomain: "taskhub-9d282.firebaseapp.com",
            projectId: "taskhub-9d282",
            storageBucket: "taskhub-9d282.firebasestorage.app",
            messagingSenderId: "981675153894",
            appId: "1:981675153894:web:380c4194bb4ea9e1f51e27"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const productsRef = collection(db, "risk_products");

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => t.className = 'toast', 3000);
        }

        // Image preview
        document.getElementById('prod-img').addEventListener('input', function() {
            const img = document.getElementById('preview-img');
            const ph = document.getElementById('preview-placeholder');
            if (this.value) {
                img.src = this.value;
                img.style.display = 'block';
                ph.style.display = 'none';
                img.onerror = () => { img.style.display = 'none'; ph.style.display = 'block'; };
            } else {
                img.style.display = 'none';
                ph.style.display = 'block';
            }
        });

        window.addProduct = async function() {
            const title = document.getElementById('prod-title').value.trim();
            const price = document.getElementById('prod-price').value.trim();
            const oldPrice = document.getElementById('prod-old-price').value.trim();
            const imgUrl = document.getElementById('prod-img').value.trim();

            if (!title || !price || !imgUrl) {
                showToast('إملي البيانات المطلوبة كلها!', true);
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'جاري الرفع...';

            try {
                await addDoc(productsRef, {
                    title, price, oldPrice, imgUrl,
                    createdAt: new Date().toISOString()
                });
                showToast('تم نشر القطعة بنجاح! 🔥');
                document.getElementById('prod-title').value = '';
                document.getElementById('prod-price').value = '';
                document.getElementById('prod-old-price').value = '';
                document.getElementById('prod-img').value = '';
                document.getElementById('preview-img').style.display = 'none';
                document.getElementById('preview-placeholder').style.display = 'block';
            } catch (e) {
                showToast('حصل خطأ، حاول تاني!', true);
            }
            btn.disabled = false;
            btn.textContent = '🔥 نشر القطعة فوراً';
        };

        window.deleteProduct = async function(id) {
            if (!confirm('عايز تمسح القطعة دي؟')) return;
            await deleteDoc(doc(db, "risk_products", id));
            showToast('تم مسح القطعة');
        };

        onSnapshot(productsRef, (snapshot) => {
            const list = document.getElementById('admin-products-list');
            const countEl = document.getElementById('products-count');
            list.innerHTML = '';

            const docs = [];
            snapshot.forEach(d => docs.push({ id: d.id, ...d.data() }));
            countEl.textContent = docs.length + ' منتج';

            // Stats
            document.getElementById('stat-total').textContent = docs.length;
            const saleCount = docs.filter(d => d.oldPrice && parseFloat(d.oldPrice) > parseFloat(d.price)).length;
            document.getElementById('stat-sale').textContent = saleCount;
            const avg = docs.length ? Math.round(docs.reduce((s, d) => s + (parseFloat(d.price)||0), 0) / docs.length) : 0;
            document.getElementById('stat-avg').textContent = avg;

            if (!docs.length) {
                list.innerHTML = '<div class="empty-admin">لا يوجد منتجات بعد.. ارفع أول قطعة!</div>';
                return;
            }

            docs.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));

            docs.forEach(({ id, title, price, oldPrice, imgUrl }) => {
                const item = document.createElement('div');
                item.className = 'admin-product-item';
                const hasDisc = oldPrice && parseFloat(oldPrice) > parseFloat(price);
                item.innerHTML = `
                    <img class="admin-thumb" src="${imgUrl}" alt="${title}" onerror="this.style.background='#222'">
                    <div class="admin-product-info">
                        <div class="admin-product-name">${title}</div>
                        <div class="admin-product-prices">
                            <span class="price-new">${price} EGP</span>
                            ${hasDisc ? `<span class="price-old-admin">${oldPrice} EGP</span>` : ''}
                        </div>
                    </div>
                    <div class="admin-actions">
                        <button class="btn-del" onclick="deleteProduct('${id}')">حذف</button>
                    </div>
                `;
                list.appendChild(item);
            });
        });
    </script>
</body>
</html>
