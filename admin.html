<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | RISK STORE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-area">
            <span class="logo-text">لوحة تحكم RISK STORE 🛠️</span>
        </div>
        <a href="index.html" style="color: #fff; text-decoration: none; font-size: 0.9rem;">عرض الموقع ←</a>
    </header>

    <div class="admin-container">
        <h2 style="margin-bottom: 25px; text-align: center;">إضافة قطعة ملابس جديدة</h2>
        
        <form id="admin-form">
            <div class="form-group">
                <label>اسم القطعة (مثال: تيشرت أوفر سايز أسود)</label>
                <input type="text" id="prod-title" class="form-control" placeholder="اكتب اسم المنتج..." required>
            </div>
            
            <div class="form-group">
                <label>السعر (بالجنيه المصري)</label>
                <input type="number" id="prod-price" class="form-control" placeholder="مثال: 350" required>
            </div>
            
            <div class="form-group">
                <label>رابط صورة المنتج (ارفع الصورة على postimg أو imgur وحط الرابط هنا)</label>
                <input type="url" id="prod-img" class="form-control" placeholder="https://example.com/photo.jpg" required>
            </div>
            
            <button type="submit" class="btn-submit">نشر القطعة فوراً في الموقع 🔥</button>
        </form>

        <hr style="border-color: #222; margin: 40px 0;">

        <h3 style="margin-bottom: 15px;">القطع المعروضة حالياً وتعديلها:</h3>
        <div id="admin-products-list">
            </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
